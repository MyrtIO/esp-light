device:
  name: MyrtLightCat
  id: myrt_light_cat
mqtt:
  namespace: myrt/light_cat
light:
  pin_ctl: 18
  led_count: 3 # 26 * 15 = 390
  controller: $raw WS2812B
  color:
    correction: 0xFFAA78
    mireds_initial: 300
    mireds_warm: 500
    mireds_cold: 135
    order: $raw GRB
  brightness:
    initial: 80
    connected: 150
    max: 230
  transition:
    color: 700
