device:
  name: MyrtLightLuminary
  id: myrt_light_luminary
mqtt:
  namespace: myrt/light_luminary
light:
  pin_ctl: 18
  led_count: 3 # 26 * 15 = 390
  controller: $raw WS2812B
  color:
    correction: 0xFFAA78
    mireds_initial: 370
    mireds_warm: 500
    mireds_cold: 135
    order: $raw GRB
  brightness:
    initial: 10
    connected: 30
    max: 200
  transition:
    color: 700
