; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esp32dev

[common]
build_flags =
	-DLWJSON_IGNORE_USER_OPTS
	-DMQTT_SOCKET_TIMEOUT=3
src_filter =
	+<*>
	-<provisioning_page/node_modules>

[env]
platform = espressif32
framework = arduino
extra_scripts = pre:scripts/pio_db_include_toolchain.py
board_build.partitions = partitions.csv
lib_deps =
	https://github.com/MaJerle/lwjson.git#2a8c724d039cd6d6bd9f7b91d3d710bce9acdb6a
	mishamyrt/LightComposer@2.0.2
	mishamyrt/CPreferences@1.2.0
	mishamyrt/CWiFiManager@1.0.4
	mishamyrt/CPubSub@1.1.1
	mishamyrt/CWebServer@1.1.0
	mishamyrt/CUpdate@1.0.0
	mishamyrt/HomeAssistantJSON@2.0.0

[env:esp32dev]
board = esp32dev
build_flags =
	${common.build_flags}
	-DCONFIG_LIGHT_CTL_GPIO=25
build_src_filter = ${common.src_filter}

[env:s2-mini]
board = lolin_s2_mini
build_flags =
	${common.build_flags}
	-DCONFIG_LIGHT_CTL_GPIO=18
	-DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=0
build_src_filter = ${common.src_filter}
